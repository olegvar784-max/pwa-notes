<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Заметки</title>
    <meta name="description" content="PWA-приложение для заметок с офлайн-доступом">
    <meta name="keywords" content="HTML, CSS, JavaScript, PWA">
    <meta name="author" content="Иван Иванов">
    <meta name="robots" content="noindex, nofollow">
    <meta name="theme-color" content="#6c63ff">
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="apple-touch-icon" href="icon.svg">
</head>
<body>
    <div class="card">
        <h1>📝 Заметки</h1>
        <textarea id="note" placeholder="Введите вашу заметку..."></textarea>
        <div class="buttons">
            <button id="saveBtn">Сохранить</button>
            <button id="clearBtn" class="secondary">Очистить</button>
            <button id="checkBtn">Проверить сеть</button>
        </div>
        <ul id="notesList"></ul>
        <p id="status"></p>
    </div>
    <script src="app.js"></script>
</body>
</html>
